<div class="card">
  <div class="card-header"><h5 class="mb-0">Create Pay Report</h5></div>
  <form class="card-body" [formGroup]="form" (ngSubmit)="save()">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Week Start</label>
        <input type="date" class="form-control" formControlName="weekStart" />
      </div>

      <div class="col-md-4">
        <label class="form-label">Week End</label>
        <input type="date" class="form-control" formControlName="weekEnd" />
        <div class="text-danger small" *ngIf="form.controls.weekEnd.hasError('range')">
          End date must be on or after start date.
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label">Driver</label>

        <ng-container *ngIf="!loadingDrivers; else loading">
          <div class="typeahead">
            <input
              class="form-control mb-2"
              type="text"
              placeholder="Type to filter drivers…"
              [(ngModel)]="driverQuery"
              [ngModelOptions]="{ standalone: true }"
              name="driverFilter"
            />
            <select class="form-select" formControlName="driverId" size="6">
              <option [ngValue]="null" disabled>Select driver</option>
              <option *ngFor="let d of filteredDrivers()" [ngValue]="d.id">{{ d.name }}</option>
            </select>
          </div>
          <div class="text-muted small mt-1" *ngIf="drivers.length === 0">
            No drivers found. Create a driver first?
          </div>
        </ng-container>

        <ng-template #loading>
          <div class="form-control-plaintext">Loading drivers…</div>
        </ng-template>
      </div>
    </div>

    <div class="mt-4 d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || saving">
        {{ saving ? 'Creating…' : 'Create Report' }}
      </button>
    </div>

    <div class="mt-2 text-danger" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="mt-2 text-success" *ngIf="successMsg">{{ successMsg }}</div>
  </form>
</div>

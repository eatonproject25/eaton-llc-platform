<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Pay Reports</h3>
    <div class="d-flex gap-2">
    <button class="btn btn-outline-danger" [disabled]="selected.length === 0" (click)="deleteSelected()">
      <i class="material-icons" style="font-size: 16px;">&#xE872;</i> Delete Selected
      </button>
    <button class="btn btn-primary" (click)="openNewReportDialog()">New Report</button>
    </div>
  </div>
  
  <div class="mb-3 row g-2">
    <div class="col-md-3">
    <input class="form-control" placeholder="Driver..." [(ngModel)]="filters.driver" (ngModelChange)="applyFilters()">
    </div>
    <div class="col-md-3">
      <input class="form-control" type="date" [(ngModel)]="filters.from" (ngModelChange)="applyFilters()">
    </div>
    <div class="col-md-3">
      <input class="form-control" type="date" [(ngModel)]="filters.to" (ngModelChange)="applyFilters()">
    </div>
  </div>
  
<app-card cardTitle="Current Pay Reports" [options]="false" blockClass="table-border-style">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th></th>
            <th>Week</th>
            <th>Driver</th>
            <th>Truck #</th>
            <th>Job #</th>
            <th>Weight/Hour</th>
            <th>Truck Paid</th>
            <th class="text-end">Total</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of reports; trackBy: trackById">
            <td><input type="checkbox" [(ngModel)]="r.selected" (ngModelChange)="onSelect()" /></td>
            <td>{{ r.weekStart }} – {{ r.weekEnd }}</td>
            <td>{{ r.driverName }}</td>
            <td></td>
            <td></td>
            <td>{{ r.totalWeightOrHours | number:'1.0-2' }}</td>
            <td>{{ r.totalTruckPaid | currency }}</td>
            <td class="text-end"><strong>{{ r.totalAmount | currency }}</strong></td>
            <td>
              <div class="action-buttons-row">
                <a href="#" class="view" title="Open" (click)="open(r.id); $event.preventDefault()" data-toggle="tooltip">
                  <i class="material-icons">&#xE417;</i>
                </a>
                <a href="#" class="edit" title="Edit" (click)="edit(r.id); $event.preventDefault()" data-toggle="tooltip">
                  <i class="material-icons">&#xE254;</i>
                </a>
                <a href="#" class="delete" title="Delete" (click)="delete(r.id); $event.preventDefault()" data-toggle="tooltip">
                  <i class="material-icons">&#xE872;</i>
                </a>
              </div>
            </td>
          </tr>
          <tr *ngIf="!reports?.length">
            <td colspan="9" class="text-center text-muted py-4">No pay reports yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </app-card>
  
  <app-new-pay-report-dialog
    *ngIf="showNewModal"
    [drivers]="drivers"
    (cancel)="onCloseNew()"
    (save)="onSaveNew($event)">
  </app-new-pay-report-dialog>

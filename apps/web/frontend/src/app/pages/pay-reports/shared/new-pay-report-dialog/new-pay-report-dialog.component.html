<div class="modal-backdrop" (click)="cancel.emit()"></div>

<div class="modal-card" role="dialog" aria-modal="true" aria-label="Create Pay Report">
  <div class="modal-header-blue">
    <h5 class="modal-title">Create Pay Report</h5>
    <button type="button" class="btn-close-white" aria-label="Close" (click)="cancel.emit()">
      <span class="close-x"></span>
    </button>
  </div>

  <div class="modal-body">
    <div class="form-group">
      <label class="form-label">Driver</label>
      <div class="typeahead">
        <input class="form-control mb-2" type="text" placeholder="Type to filter drivers…" [(ngModel)]="driverQuery" />
        <select class="form-select" size="6" [(ngModel)]="selectedDriverId">
          <option *ngFor="let d of filteredDrivers()" [ngValue]="d.id">{{ d.name }}</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Week</label>
      <div class="row g-2">
        <div class="col-6">
          <input class="form-control" type="date" [(ngModel)]="weekStart" />
        </div>
        <div class="col-6">
          <input class="form-control" type="date" [(ngModel)]="weekEnd" />
        </div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn btn-primary btn-full-width" [disabled]="!canSave()" (click)="doSave()">Create Pay Report</button>
  </div>
</div>

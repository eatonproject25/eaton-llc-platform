<form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>
    <img src="assets/images/logo-thumb.png" alt="Trucking Team Logo" class="logo" />
  
    <h1>Password Recovery</h1>
    <p class="sub" *ngIf="stage === 'request'">
      Enter your email and we’ll send you a one-time code to reset your password.
    </p>
    <p class="sub" *ngIf="stage === 'reset'">
      Enter the code we sent and a new password.
    </p>
  
    <label>
      Email
      <input
        formControlName="email"
        type="email"
        placeholder="you@example.com"
        autocomplete="email"
        aria-required="true"
        [attr.aria-invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
    </label>
    <div class="err" *ngIf="form.controls.email.touched && form.controls.email.invalid">
      Enter a valid email.
    </div>

    <ng-container *ngIf="stage === 'reset'">
      <label>
        Code
        <input
          formControlName="code"
          placeholder="6-digit code"
          maxlength="6"
          autocomplete="one-time-code"
        />
      </label>
      <div class="err" *ngIf="form.controls.code.touched && form.controls.code.invalid">
        Enter the 6-digit code.
      </div>

      <label>
        New Password
        <input
          type="password"
          formControlName="newPassword"
          placeholder="At least 8 characters"
          autocomplete="new-password"
        />
      </label>
      <div class="err" *ngIf="form.controls.newPassword.touched && form.controls.newPassword.invalid">
        Password must be at least 8 characters.
      </div>
    </ng-container>
  
    <button type="submit" [disabled]="loading || form.invalid">
      {{ loading ? 'Working…' : (stage === 'request' ? 'Send code' : 'Reset password') }}
    </button>
  
    <p class="ok" *ngIf="msg">{{ msg }}</p>
    <p class="err" *ngIf="err">{{ err }}</p>
  
    <div class="alt">
      <a [routerLink]="['/auth/login']">Back to sign in</a>
    </div>
  </form>
